name: Ecosystem Integration Test

on:
  pull_request:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: read
  packages: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration-test:
    # Use the specific commit hash from the wallet-ecosystem repository for stability.
    uses: diggsweden/wallet-ecosystem/.github/workflows/reusable-integration.yml@43476fcf7d90d409e031806610af632526146de4
    with:
      service-name: wallet-provider
      service-repo: ${{ github.repository }}
      service-ref: ${{ github.event.pull_request.head.sha || github.ref }}
