name: Ecosystem Integration Test

on:
  pull_request:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: read
  packages: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration-test:
    # Use the specific commit hash from the wallet-ecosystem repository for stability.
    # This hash corresponds to the merge of the reusable integration workflow into main.
    uses: diggsweden/wallet-ecosystem/.github/workflows/reusable-integration.yml@9e6dc51009cc75d0a7000df9b35462c3e70c216d
    with:
      service-name: wallet-provider
      service-repo: ${{ github.repository }}
      service-ref: ${{ github.event.pull_request.head.sha || github.ref }}
